services:

  # =========================================================================
  # PQC Observatory scanner (Observatory + PCAP Analyser bundled)
  # =========================================================================
  observatory:
    build:
      # Build context is the repo root so the Dockerfile can access both
      # pcap-analyser/ and observatory/.
      context: ..
      dockerfile: observatory/Dockerfile
    restart: unless-stopped
    # CAP_NET_RAW allows tcpdump to capture packets without running as root.
    cap_add:
      - NET_RAW
    environment:
      # Override any setting via environment variable or an .env file.
      # e.g. OBSERVATORY_SCAN_SCHEDULE_HOUR=3
      OBSERVATORY_SCAN_CLIENT: ${OBSERVATORY_SCAN_CLIENT:-openssl}
      OBSERVATORY_PQC_PROBE_GROUPS: ${OBSERVATORY_PQC_PROBE_GROUPS:-MLKEM512,MLKEM768,MLKEM1024,SecP256r1MLKEM768,X25519MLKEM768,SecP384r1MLKEM1024,curveSM2MLKEM768,X25519Kyber768Draft00,SecP256r1Kyber768Draft00}
      OBSERVATORY_SCAN_SCHEDULE_DAY_OF_WEEK: ${OBSERVATORY_SCAN_SCHEDULE_DAY_OF_WEEK:-sun}
      OBSERVATORY_SCAN_SCHEDULE_HOUR: ${OBSERVATORY_SCAN_SCHEDULE_HOUR:-8}
      OBSERVATORY_SCAN_SCHEDULE_MINUTE: ${OBSERVATORY_SCAN_SCHEDULE_MINUTE:-0}
      OBSERVATORY_SCAN_SCHEDULE_TIMEZONE: ${OBSERVATORY_SCAN_SCHEDULE_TIMEZONE:-Europe/Berlin}
    volumes:
      # Persistent pcap archive.  Mount a host directory here in production.
      - pcap_store:/var/pqc-obs/captures
      # Persistent JSON data store for targets and scan history.
      - observatory_data:/var/pqc-obs/data
      # Optionally override the target list without rebuilding the image.
      - ./targets:/app/targets:ro
    env_file:
      - path: .env
        required: false

volumes:
  pcap_store:
  observatory_data:
